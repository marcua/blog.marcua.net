<header class="site-header">
  <div class="header-inner">
    <a class="site-title" rel="author" href="{{ "/" | relative_url }}">
      <span class="site-title-marker"></span>
      {{ site.title | escape }}
    </a>

    <nav class="site-nav">
      <input type="checkbox" id="nav-trigger" class="nav-trigger" />
      <label for="nav-trigger" class="menu-toggle" aria-label="Menu">
        <svg width="20" height="14" viewBox="0 0 20 14" fill="none">
          <line x1="0" y1="1" x2="20" y2="1" stroke="currentColor" stroke-width="2"/>
          <line x1="0" y1="7" x2="20" y2="7" stroke="currentColor" stroke-width="2"/>
          <line x1="0" y1="13" x2="20" y2="13" stroke="currentColor" stroke-width="2"/>
        </svg>
      </label>
      <div class="nav-items">
        <a class="nav-item" href="{{ "/" | relative_url }}">Blog</a>
        <a class="nav-item" href="https://marcua.net">About</a>
        {%- if site.minima.social_links -%}
          {%- for link in site.minima.social_links -%}
            <a class="nav-item nav-social" href="{{ link.url }}" title="{{ link.title }}">{{ link.title }}</a>
          {%- endfor -%}
        {%- endif -%}
      </div>
    </nav>
  </div>
</header>
