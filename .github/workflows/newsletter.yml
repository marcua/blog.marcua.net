name: Newsletter

on:
  schedule:
    - cron: "0 */4 * * *"
  workflow_dispatch:

# Never let a scheduled run overlap a manual dispatch; overlapping runs could
# both read "not yet sent" for the same recipient and double-send.
concurrency:
  group: newsletter
  cancel-in-progress: false

jobs:
  send:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Send newsletter
        env:
          PYTHONUNBUFFERED: "1"
          BLOG_URL: ${{ secrets.BLOG_URL }}
          FROM_EMAIL: ${{ secrets.FROM_EMAIL }}
          REPLY_TO: ${{ secrets.REPLY_TO }}
          ADMIN_EMAIL: ${{ secrets.ADMIN_EMAIL }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USERNAME: ${{ secrets.SMTP_USERNAME }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          AYB_API_URL: ${{ secrets.AYB_API_URL }}
          AYB_TOKEN: ${{ secrets.AYB_TOKEN }}
        run: python newsletter/newsletter.py
