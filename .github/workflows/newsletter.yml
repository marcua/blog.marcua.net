name: Newsletter

on:
  schedule:
    - cron: "0 */4 * * *"
  workflow_dispatch:

permissions:
  contents: write

# Never let a scheduled run overlap a manual dispatch (or another schedule);
# overlapping runs would each read the same state and double-send.
concurrency:
  group: newsletter
  cancel-in-progress: false

jobs:
  send:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # Full history so the script can rebase/push the state file cleanly.
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Send newsletter
        env:
          PYTHONUNBUFFERED: "1"
          BLOG_URL: ${{ secrets.BLOG_URL }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          RESEND_AUDIENCE_ID: ${{ secrets.RESEND_AUDIENCE_ID }}
          FROM_EMAIL: ${{ secrets.FROM_EMAIL }}
          ADMIN_EMAIL: ${{ secrets.ADMIN_EMAIL }}
        run: python .github/workflows/newsletter.py

      - name: Backstop push state
        # The script checkpoints/pushes per post; this catches a state commit
        # that was made locally but not pushed (e.g. a late failure).
        if: always()
        run: |
          git pull --rebase --autostash origin "$GITHUB_REF_NAME" || true
          git push origin "HEAD:$GITHUB_REF_NAME" || true
